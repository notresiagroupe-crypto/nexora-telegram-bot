name: NEXORA Telegram Bot 24/7

on:
  schedule:
    - cron: '0 */5 * * *'   # Toutes les 5 heures
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290  # 4h50 max par job

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-telegram-bot==20.7

      - name: Run NEXORA Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py
