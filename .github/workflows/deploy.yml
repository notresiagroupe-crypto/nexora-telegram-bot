name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install & Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g @railway/cli
          
          {
            echo "=== RAILWAY VERSION ==="
            railway --version
            echo "=== RAILWAY STATUS ==="
            railway status
            echo "=== RAILWAY UP ==="
            railway up --service nexora-bot --detach
          } 2>&1 | tee output.txt
          
          EXIT=${PIPESTATUS[0]}
          
          # Commit output to repo so we can read it
          git config user.email "ci@nexora.fr"
          git config user.name "CI"
          git add output.txt
          git commit -m "ci: deploy output" || true
          git push https://x-access-token:$GH_TOKEN@github.com/notresiagroupe-crypto/nexora-telegram-bot.git HEAD:main || true
          
          exit $EXIT
