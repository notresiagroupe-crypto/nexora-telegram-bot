name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          npm install -g @railway/cli
          railway up --detach 2>&1
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
