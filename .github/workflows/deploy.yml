name: "NEXORA Bot 24/7"
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"
jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install python-telegram-bot==20.7
      - name: Check token
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          RESP=$(curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/getMe")
          echo "$RESP"
          echo "$RESP" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if d.get('ok'):
    print('Token OK - Bot:', d['result']['username'])
else:
    print('ERREUR TOKEN:', d.get('description',''))
    exit(1)
"
      - name: Start bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python3 bot.py
