name: NEXORA Telegram Bot 24/7

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-telegram-bot==20.7

      - name: Check token via curl
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          echo "=== Testing token ==="
          RESP=$(curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/getMe")
          echo "$RESP"
          echo "$RESP" > /tmp/token_check.txt
          # Check if OK
          echo "$RESP" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if d.get('ok'):
    print('✅ Token valid! Bot:', d['result']['username'])
else:
    print('❌ Token INVALID:', d.get('description'))
    sys.exit(1)
"

      - name: Run Bot
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python3 bot.py
